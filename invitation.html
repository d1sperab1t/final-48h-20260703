<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>寻迹莫干山 · 记路家计划 S1</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #080907; --pine: #1F2A1C; --moss: #7A8D4A; --paper: #EAE0C8;
      --paper2: #CBBF9C; --clay: #B86435; --rust: #7D3824;
      --muted: #928A75; --dim: #575545;
    }
    html { scroll-behavior: smooth; }
    body {
      min-height: 100vh; color: var(--paper);
      background: radial-gradient(circle at 18% 12%, rgba(247,244,234,0.18), transparent 30%),
        radial-gradient(circle at 86% 20%, rgba(0,151,168,0.2), transparent 32%),
        radial-gradient(circle at 48% 100%, rgba(228,108,52,0.18), transparent 36%),
        linear-gradient(155deg, #006D7D, #052D38 54%, #061014);
      font-family: Inter, Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      overflow: hidden; display: flex; align-items: center; justify-content: center;
    }
    body::before {
      content: ""; position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, rgba(255,255,255,0.024) 0 1px, transparent 1px 7px),
        radial-gradient(circle at 50% 38%, transparent 0 44%, rgba(0,0,0,0.42) 100%);
      mix-blend-mode: overlay; pointer-events: none; z-index: 3;
    }
    body::after {
      content: ""; position: fixed; inset: -20%;
      background-image: linear-gradient(rgba(247,244,234,0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(247,244,234,0.036) 1px, transparent 1px);
      background-size: 58px 58px; transform: rotate(-4deg);
      mask-image: radial-gradient(circle at 50% 24%, black, transparent 74%);
      pointer-events: none; z-index: 0;
    }
    #bg-canvas { position: fixed; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }

    /* ─── Card ─── */
    .card {
      position: relative; z-index: 2;
      width: min(100%, 500px); margin: 24px;
      border: 1px solid rgba(234,224,200,0.15);
      box-shadow: 0 0 100px rgba(0,0,0,0.6);
      overflow: hidden; opacity: 0; transform: translateY(30px) scale(0.97);
      animation: cardIn 1s ease 0.3s forwards;
    }
    @keyframes cardIn { to { opacity:1; transform:translateY(0) scale(1); } }

    .card-bg {
      position: absolute; inset: 0;
      background: linear-gradient(170deg, rgba(0,58,70,0.65), rgba(6,16,20,0.92));
    }
    .card-bg::before {
      content: ""; position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(234,224,200,0.07), transparent 50%);
    }
    .card-shine {
      position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
      background: conic-gradient(from 0deg, transparent 0%, rgba(234,224,200,0.03) 10%, transparent 20%);
      animation: shineSpin 12s linear infinite;
    }
    @keyframes shineSpin { to { transform: rotate(360deg); } }

    .card-inner { position: relative; z-index: 1; }

    /* ─── Eyebrow ─── */
    .card-top { padding: 28px 28px 0; }
    .eyebrow {
      display: flex; align-items: center; gap: 10px;
      color: var(--moss); font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
      opacity: 0; animation: fadeUp 0.8s ease 0.8s forwards;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .seal-dot { width: 34px; height: 1px; background: var(--moss); box-shadow: 0 0 16px rgba(122,141,74,0.34); }

    /* ─── Icon ─── */
    .card-body { padding: 28px 28px 24px; text-align: center; }

    .icon-ring {
      width: 80px; height: 80px; margin: 0 auto 28px;
      position: relative;
      opacity: 0; animation: fadeUp 0.8s ease 1s forwards;
    }
    .icon-ring::before, .icon-ring::after {
      content: ""; position: absolute; inset: 0;
      border-radius: 50%; border: 1.5px solid var(--moss);
    }
    .icon-ring::before { animation: ringPulse 3s ease-in-out infinite; }
    .icon-ring::after { inset: -8px; border-color: rgba(122,141,74,0.2); animation: ringPulse 3s ease-in-out infinite 0.5s; }
    @keyframes ringPulse { 0%,100%{opacity:.4;transform:scale(1)} 50%{opacity:1;transform:scale(1.03)} }

    .icon-inner {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, rgba(122,141,74,0.15), rgba(184,100,53,0.1));
      border-radius: 50%;
    }
    .icon-inner span { font-size: 34px; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3)); }

    /* ─── Title ─── */
    .title-main {
      font-size: 16px; font-weight: 700; letter-spacing: 3px; color: var(--paper);
      margin-bottom: 14px; opacity: 0; animation: fadeUp 0.8s ease 1.2s forwards;
    }
    .title-hero {
      font-size: clamp(28px, 8vw, 42px); line-height: 1.2; font-weight: 950;
      letter-spacing: -1px; margin-bottom: 6px;
      opacity: 0; animation: titleReveal 1s ease 1.4s forwards;
    }
    @keyframes titleReveal { from { opacity:0; transform:translateY(16px); letter-spacing:6px; } to { opacity:1; transform:translateY(0); letter-spacing:-1px; } }
    .title-hero .accent {
      color: var(--clay); position: relative; display: inline-block;
    }
    .title-hero .accent::before {
      content: ""; position: absolute; bottom: -2px; left: 0; right: 0;
      height: 3px; background: var(--clay); transform: scaleX(0); transform-origin: left;
      animation: lineGrow 0.8s ease 2s forwards;
    }
    @keyframes lineGrow { to { transform: scaleX(1); } }
    .title-sub {
      font-size: clamp(20px, 5vw, 32px); font-weight: 950; letter-spacing: 2px;
      color: var(--paper); opacity: 0; animation: fadeUp 0.8s ease 1.6s forwards;
    }

    /* ─── Divider ─── */
    .divider {
      height: 1px; margin: 24px 0;
      background: linear-gradient(90deg, transparent, rgba(234,224,200,0.3), transparent);
      position: relative; overflow: hidden;
    }
    .divider::after {
      content: ""; position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, var(--paper2), transparent);
      animation: dividerSweep 4s ease-in-out infinite;
    }
    @keyframes dividerSweep { 0%{left:-60%} 100%{left:160%} }

    /* ─── Message ─── */
    .message {
      color: #DDD1B6; font-size: 14px; line-height: 2.4;
      letter-spacing: 0.8px; text-align: center;
      opacity: 0; animation: fadeUp 0.8s ease 1.8s forwards;
    }
    .message strong { color: var(--paper); font-weight: 900; }

    /* ─── Tagline ─── */
    .tagline {
      display: block; margin: 28px auto 0; padding: 10px 20px;
      background: rgba(122,141,74,0.08); border: 1px solid rgba(122,141,74,0.2);
      color: var(--moss); font-size: 10px; font-weight: 900;
      letter-spacing: 3px; text-transform: uppercase; text-align: center;
      opacity: 0; animation: fadeUp 0.8s ease 2.2s forwards;
    }

    /* ─── Beat Bars ─── */
    .beat-bars {
      height: 36px; display: flex; align-items: end; gap: 5px;
      justify-content: center; margin-top: 24px;
      opacity: 0; animation: fadeUp 0.6s ease 2.4s forwards;
    }
    .beat-bars i {
      width: 7px; height: 10px; background: var(--paper); border-radius: 999px;
      animation: beat .86s ease-in-out infinite; opacity: .6;
    }
    .beat-bars i:nth-child(4) { background: var(--clay); }
    .beat-bars i:nth-child(2) { animation-delay:.08s; }
    .beat-bars i:nth-child(3) { animation-delay:.16s; }
    .beat-bars i:nth-child(4) { animation-delay:.24s; }
    .beat-bars i:nth-child(5) { animation-delay:.32s; }
    .beat-bars i:nth-child(6) { animation-delay:.4s; }
    .beat-bars i:nth-child(7) { animation-delay:.48s; }
    @keyframes beat { 0%,100%{height:8px;transform:translateY(0)} 50%{height:26px;transform:translateY(-2px)} }

    /* ─── Footer ─── */
    .card-footer {
      padding: 16px 28px;
      border-top: 1px solid rgba(234,224,200,0.1);
      display: flex; align-items: center; justify-content: space-between;
      color: var(--dim); font-size: 10px; letter-spacing: 2px;
      opacity: 0; animation: fadeUp 0.6s ease 2.6s forwards;
    }
    .footer-line { flex: 1; height: 1px; margin: 0 14px; background: linear-gradient(90deg, var(--moss), transparent, var(--clay)); opacity: 0.4; }

    /* ─── Floating particles ─── */
    .particle {
      position: fixed; border-radius: 50%; pointer-events: none;
      background: var(--paper); opacity: 0; z-index: 2;
      animation: floatUp linear forwards;
    }
    @keyframes floatUp {
      0% { opacity:0; transform:translateY(0) scale(0); }
      10% { opacity:0.6; transform:translateY(-20px) scale(1); }
      90% { opacity:0.3; }
      100% { opacity:0; transform:translateY(-100vh) scale(0.5); }
    }

    .ripple {
      position: fixed; width: 16px; height: 16px;
      border: 1px solid rgba(247,244,234,0.8); border-radius: 50%;
      pointer-events: none; transform: translate(-50%,-50%) scale(1);
      animation: ripple .7s ease-out forwards; z-index: 500;
    }
    @keyframes ripple { to{opacity:0;transform:translate(-50%,-50%) scale(9)} }

    @media(max-width:600px) {
      .card { margin: 16px; }
      .card-top { padding: 22px 20px 0; }
      .card-body { padding: 24px 20px 20px; }
      .card-footer { padding: 14px 20px; }
      .title-hero { font-size: 26px; letter-spacing: 0; white-space: nowrap; }
      .title-sub { font-size: 22px; }
    }
    @media(prefers-reduced-motion:reduce) { *{animation-duration:0s!important;animation-delay:0s!important} }
  </style>
</head>
<body>
  <canvas id="bg-canvas" aria-hidden="true"></canvas>

  <div class="card">
    <div class="card-bg"></div>
    <div class="card-shine"></div>
    <div class="card-inner">
      <div class="card-top">
        <div class="eyebrow"><span class="seal-dot"></span>FIELD CASE ARCHIVED</div>
      </div>

      <div class="card-body">
        <div class="icon-ring">
          <div class="icon-inner"><span>🏔️</span></div>
        </div>

        <div class="title-main">恭喜你顺利完成</div>
        <div class="title-hero"><span class="accent">寻迹莫干山 · 记路家计划</span></div>
        <div class="title-sub">S1期</div>

        <div class="divider"></div>

        <p class="message">
          本次线上剧本就此<strong>销毁</strong><br>
          你们的探访档案将在莫沃斯电子档案库内<strong>永存</strong><br>
          让我们期待<strong>下一期</strong>再相遇
        </p>

        <div class="tagline">NO FINISH LINE · THERE IS NO FINISH LINE</div>

        <div class="beat-bars"><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>
      </div>

      <div class="card-footer">
        <span>48H</span>
        <span class="footer-line"></span>
        <span>MOGANSHAN</span>
      </div>
    </div>
  </div>

  <script>
    // Click ripple
    addEventListener('click', e => {
      const r = document.createElement('span');
      r.className = 'ripple';
      r.style.left = e.clientX + 'px';
      r.style.top = e.clientY + 'px';
      document.body.appendChild(r);
      setTimeout(() => r.remove(), 760);
    });

    // Floating particles
    (function spawnParticles() {
      const colors = ['#EAE0C8','#B86435','#7A8D4A','#CBBF9C'];
      for (let i = 0; i < 18; i++) {
        setTimeout(() => {
          const p = document.createElement('div');
          p.className = 'particle';
          const size = 2 + Math.random() * 4;
          p.style.width = size + 'px';
          p.style.height = size + 'px';
          p.style.left = Math.random() * 100 + 'vw';
          p.style.bottom = '-10px';
          p.style.background = colors[Math.floor(Math.random() * colors.length)];
          p.style.animationDuration = (8 + Math.random() * 12) + 's';
          p.style.animationDelay = (Math.random() * 6) + 's';
          document.body.appendChild(p);
          p.addEventListener('animationend', () => p.remove());
        }, i * 400);
      }
      setInterval(() => {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = 2 + Math.random() * 4;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.bottom = '-10px';
        p.style.background = colors[Math.floor(Math.random() * colors.length)];
        p.style.animationDuration = (8 + Math.random() * 12) + 's';
        document.body.appendChild(p);
        p.addEventListener('animationend', () => p.remove());
      }, 2000);
    })();

    // Background canvas
    (function bootCanvas() {
      const c = document.getElementById('bg-canvas');
      const ctx = c.getContext('2d');
      const reduced = matchMedia('(prefers-reduced-motion:reduce)').matches;
      let w = 0, h = 0, dpr = 1;
      const motes = Array.from({length:55}, () => ({
        x: Math.random(), y: Math.random(),
        r: 0.4 + Math.random()*1.2,
        speed: 0.08 + Math.random()*0.3,
        drift: -0.12 + Math.random()*0.24
      }));
      function resize() {
        dpr = Math.min(devicePixelRatio||1, 2);
        w = innerWidth; h = innerHeight;
        c.width = Math.floor(w*dpr); c.height = Math.floor(h*dpr);
        c.style.width = w+'px'; c.style.height = h+'px';
        ctx.setTransform(dpr,0,0,dpr,0,0);
      }
      function frame(t) {
        ctx.clearRect(0,0,w,h);
        ctx.globalCompositeOperation = 'lighter';
        motes.forEach(m => {
          m.y += m.speed*0.0012;
          m.x += Math.sin(t*0.0005+m.speed*8)*0.0004 + m.drift*0.00015;
          if(m.y>1.06){m.y=-0.04;m.x=Math.random();}
          if(m.x<-0.04)m.x=1.04; if(m.x>1.04)m.x=-0.04;
          ctx.globalAlpha = 0.08 + m.speed*0.1;
          ctx.fillStyle = '#F7F4EA';
          ctx.beginPath(); ctx.arc(m.x*w, m.y*h, m.r, 0, Math.PI*2); ctx.fill();
        });
        ctx.globalAlpha = 1; ctx.globalCompositeOperation = 'source-over';
        if(!reduced) requestAnimationFrame(frame);
      }
      resize(); addEventListener('resize', resize); requestAnimationFrame(frame);
    })();
  </script>
</body>
</html>
